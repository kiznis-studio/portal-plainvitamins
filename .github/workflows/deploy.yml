name: Build & Deploy to Titan

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Deploy to Titan
        env:
          SSH_KEY: ${{ secrets.TITAN_SSH_KEY }}
          TITAN_HOST: ${{ secrets.TITAN_HOST }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          SLUG="${REPO_NAME#portal-}"

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/titan_key
          chmod 600 ~/.ssh/titan_key
          ssh-keyscan -H "$TITAN_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -i ~/.ssh/titan_key docker-compose.titan.yml \
            "root@${TITAN_HOST}:/opt/portals/${SLUG}/"

          # Single SSH session with isolated Docker config to prevent credential
          # race conditions during concurrent deploys. Retries pull up to 3 times
          # to handle transient containerd errors from parallel pulls.
          # Prune is best-effort (|| true) since concurrent prunes conflict.
          echo "$GHCR_TOKEN" | ssh -i ~/.ssh/titan_key "root@${TITAN_HOST}" "\
            DCFG=\$(mktemp -d) && \
            docker --config \$DCFG login ghcr.io -u github-actions --password-stdin && \
            pull_ok=false && \
            for i in 1 2 3; do \
              docker --config \$DCFG pull ${IMAGE}:latest && { pull_ok=true; break; }; \
              echo \"Pull attempt \$i/3 failed, retrying in 15s...\"; sleep 15; \
            done && \
            rm -rf \$DCFG && \
            \$pull_ok || { echo 'ERROR: Pull failed after 3 attempts'; exit 1; } && \
            cd /opt/portals/${SLUG} && \
            docker compose -f docker-compose.titan.yml up -d && \
            docker image prune -f 2>/dev/null || true"
