name: Build & Deploy to Titan

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Deploy to Titan
        env:
          SSH_KEY: ${{ secrets.TITAN_SSH_KEY }}
          TITAN_HOST: ${{ secrets.TITAN_HOST }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          SLUG="${REPO_NAME#portal-}"

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/titan_key
          chmod 600 ~/.ssh/titan_key
          ssh-keyscan -H "$TITAN_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          scp -i ~/.ssh/titan_key docker-compose.titan.yml \
            "root@${TITAN_HOST}:/opt/portals/${SLUG}/"

          echo "$GHCR_TOKEN" | ssh -i ~/.ssh/titan_key "root@${TITAN_HOST}" \
            "docker login ghcr.io -u github-actions --password-stdin"

          ssh -i ~/.ssh/titan_key "root@${TITAN_HOST}" "\
            docker pull ${IMAGE}:latest && \
            cd /opt/portals/${SLUG} && \
            docker compose -f docker-compose.titan.yml up -d && \
            docker logout ghcr.io && \
            docker image prune -f"
